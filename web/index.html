<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2D2D2D">
    <title>Go2DaBoy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="loading-screen">
            <div class="loader"></div>
            <p>Loading emulator...</p>
        </div>

        <div id="console" class="hidden">
            <div id="emu-shell">
                <!-- Screen section -->
                <div id="screen-area">
                    <div id="power-led"></div>
                    <div id="screen-bezel">
                        <div id="bezel-lines">
                            <div class="bezel-line line-wine"></div>
                            <div class="bezel-line line-navy"></div>
                        </div>
                        <div id="screen-label">DOT MATRIX EMULATOR</div>
                        <div id="screen-well">
                            <canvas id="screen" width="160" height="144"></canvas>
                            <canvas id="grid-overlay"></canvas>
                            <div id="ff-indicator">&gt;&gt;</div>
                        </div>
                        <div id="game-title"></div>
                    </div>
                </div>

                <!-- Brand -->
                <div id="brand">
                    <span id="brand-main">Go2DaBoy</span>
                </div>

                <!-- D-Pad + A/B -->
                <div id="controls">
                    <div id="dpad-container">
                        <div id="dpad">
                            <button class="dpad-btn dpad-up" data-btn="6" aria-label="Up"></button>
                            <button class="dpad-btn dpad-left" data-btn="5" aria-label="Left"></button>
                            <div class="dpad-nub"></div>
                            <button class="dpad-btn dpad-right" data-btn="4" aria-label="Right"></button>
                            <button class="dpad-btn dpad-down" data-btn="7" aria-label="Down"></button>
                        </div>
                    </div>

                    <div id="ab-container">
                        <div id="ab-group">
                            <div class="ab-wrap">
                                <button class="ab-btn" id="btn-b" data-btn="1"></button>
                                <span class="ab-label">B</span>
                            </div>
                            <div class="ab-wrap">
                                <button class="ab-btn" id="btn-a" data-btn="0"></button>
                                <span class="ab-label">A</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Select / Start -->
                <div id="ss-area">
                    <div class="ss-wrap">
                        <button class="ss-btn" data-btn="2" aria-label="Select"></button>
                        <span class="ss-label">SELECT</span>
                    </div>
                    <div class="ss-wrap">
                        <button class="ss-btn" data-btn="3" aria-label="Start"></button>
                        <span class="ss-label">START</span>
                    </div>
                </div>

                <!-- Speaker grille -->
                <div id="speaker">
                    <div class="grille-slot"></div>
                    <div class="grille-slot"></div>
                    <div class="grille-slot"></div>
                    <div class="grille-slot"></div>
                    <div class="grille-slot"></div>
                    <div class="grille-slot"></div>
                </div>
            </div>

            <!-- Toolbar (below the shell) -->
            <div id="toolbar">
                <label class="toolbar-btn">
                    LOAD
                    <input type="file" id="rom-input" accept=".gb,.gbc,.bin,application/octet-stream,*/*" hidden>
                </label>
                <button id="btn-reset" class="toolbar-btn">RESET</button>
                <button id="btn-sound" class="toolbar-btn">SND: ON</button>
                <button id="btn-ff" class="toolbar-btn">FF</button>
                <button id="btn-controls" class="toolbar-btn">KEYS</button>
                <button id="btn-colors" class="toolbar-btn">COLORS</button>
            </div>
        </div>

        <!-- Keyboard controls modal -->
        <div id="controls-modal" class="hidden">
            <div id="modal-overlay"></div>
            <div id="modal-content">
                <h2>Keyboard Controls</h2>
                <div id="bindings-list"></div>
                <div id="modal-buttons">
                    <button id="btn-reset-bindings">Reset Defaults</button>
                    <button id="btn-close-modal">Close</button>
                </div>
            </div>
        </div>
    </div>

        <!-- Color palette modal -->
        <div id="colors-modal" class="hidden">
            <div id="colors-overlay"></div>
            <div id="colors-content">
                <h2>Color Palette</h2>
                <div id="palette-presets"></div>
                <div id="palette-pickers">
                    <div class="picker-row">
                        <span class="picker-label">Lightest</span>
                        <input type="color" id="color-0" class="color-input" value="#9BBC0F">
                        <input type="text" id="hex-0" class="hex-input" maxlength="7" value="#9BBC0F">
                    </div>
                    <div class="picker-row">
                        <span class="picker-label">Light</span>
                        <input type="color" id="color-1" class="color-input" value="#8BAC0F">
                        <input type="text" id="hex-1" class="hex-input" maxlength="7" value="#8BAC0F">
                    </div>
                    <div class="picker-row">
                        <span class="picker-label">Dark</span>
                        <input type="color" id="color-2" class="color-input" value="#306230">
                        <input type="text" id="hex-2" class="hex-input" maxlength="7" value="#306230">
                    </div>
                    <div class="picker-row">
                        <span class="picker-label">Darkest</span>
                        <input type="color" id="color-3" class="color-input" value="#0F380F">
                        <input type="text" id="hex-3" class="hex-input" maxlength="7" value="#0F380F">
                    </div>
                </div>
                <div id="palette-preview">
                    <div class="preview-swatch" id="swatch-0"></div>
                    <div class="preview-swatch" id="swatch-1"></div>
                    <div class="preview-swatch" id="swatch-2"></div>
                    <div class="preview-swatch" id="swatch-3"></div>
                </div>
                <div id="lcd-response-section">
                    <h3>LCD Response</h3>
                    <div id="lcd-response-options">
                        <button class="lcd-opt" data-lcd="off">OFF</button>
                        <button class="lcd-opt active" data-lcd="on">ON</button>
                    </div>
                </div>
                <div id="scanline-section">
                    <h3>Scanlines</h3>
                    <div id="scanline-options">
                        <button class="scan-opt" data-scan="">OFF</button>
                        <button class="scan-opt active" data-scan="scan-dmg">DMG-01</button>
                        <button class="scan-opt" data-scan="scan-clean">CLEAN</button>
                        <button class="scan-opt" data-scan="scan-heavy">HEAVY</button>
                        <button class="scan-opt" data-scan="scan-lcd">LCD</button>
                    </div>
                </div>
                <div id="colors-buttons">
                    <button id="btn-reset-colors">Reset Default</button>
                    <button id="btn-close-colors">Close</button>
                </div>
            </div>
        </div>

    <script src="wasm_exec.js"></script>
    <script src="app.js"></script>
</body>
</html>
